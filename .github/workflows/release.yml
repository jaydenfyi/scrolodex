name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: macos-15
    permissions:
      contents: write # push prepare-release commit
    outputs:
      has_release: ${{ steps.prepare.outputs.has_release }}
      sha: ${{ steps.commit.outputs.sha }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
      - name: Install Knope
        run: brew install knope-dev/tap/knope
      - name: Prepare release
        id: prepare
        run: |
          if knope prepare-release --verbose; then
            echo "has_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_release=false" >> "$GITHUB_OUTPUT"
            echo "No new changes to release — skipping downstream jobs."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push release commit
        if: steps.prepare.outputs.has_release == 'true'
        run: git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Store commit SHA
        if: steps.prepare.outputs.has_release == 'true'
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Store version
        if: steps.prepare.outputs.has_release == 'true'
        id: version
        run: echo "version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: prepare-release
    if: needs.prepare-release.outputs.has_release == 'true'
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare-release.outputs.sha }}
          persist-credentials: false
      - name: Build release
        run: swift build -c release
      - name: Assemble app bundle
        run: |
          RELEASE_DIR=.build/arm64-apple-macosx/release
          APP_DIR="$RELEASE_DIR/Scrolodex.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp "$RELEASE_DIR/Scrolodex" "$APP_DIR/Contents/MacOS/Scrolodex"
          cp Resources/Info.plist "$APP_DIR/Contents/Info.plist"
          cp Sources/Scrolodex/Resources/MenuBarIcon.svg "$APP_DIR/Contents/Resources/"
      - name: Ad-hoc sign
        run: codesign --force --sign - .build/arm64-apple-macosx/release/Scrolodex.app
      - name: Create zip
        run: |
          VERSION="${NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION}"
          ditto -c -k --keepParent \
            .build/arm64-apple-macosx/release/Scrolodex.app \
            .build/arm64-apple-macosx/release/Scrolodex-$VERSION.zip
        env:
          NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION: ${{ needs.prepare-release.outputs.version }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: Scrolodex-${{ needs.prepare-release.outputs.version }}.zip
          path: .build/arm64-apple-macosx/release/Scrolodex-${{ needs.prepare-release.outputs.version }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [prepare-release, build]
    if: needs.prepare-release.outputs.has_release == 'true'
    runs-on: macos-15
    permissions:
      contents: write # create GitHub Release + tag
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare-release.outputs.sha }}
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: Scrolodex-${{ needs.prepare-release.outputs.version }}.zip
          path: .build/arm64-apple-macosx/release/
      - name: Create GitHub Release
        run: |
          VERSION="${NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION}"
          RELEASE_NOTES="$(mktemp)"
          awk -v version="${VERSION}" '
            $0 == "## " version || index($0, "## " version " ") == 1 || index($0, "## " version " (") == 1 { in_section=1; print; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > "${RELEASE_NOTES}"
          test -s "${RELEASE_NOTES}" || echo "Scrolodex ${VERSION}" > "${RELEASE_NOTES}"
          gh release create "v${VERSION}" \
            ".build/arm64-apple-macosx/release/Scrolodex-${VERSION}.zip" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${NEEDS_PREPARE_RELEASE_OUTPUTS_SHA}" \
            --title "v${VERSION}" \
            --notes-file "${RELEASE_NOTES}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEEDS_PREPARE_RELEASE_OUTPUTS_SHA: ${{ needs.prepare-release.outputs.sha }}
          NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION: ${{ needs.prepare-release.outputs.version }}

  update-tap:
    name: Update Homebrew Tap
    needs: [prepare-release, release]
    if: needs.prepare-release.outputs.has_release == 'true'
    runs-on: macos-15
    permissions:
      contents: read # read Scrolodex source archive + release asset with GITHUB_TOKEN
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: jaydenfyi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          persist-credentials: true
      - name: Compute SHA256s
        id: sha
        run: |
          VERSION="${NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION}"
          curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/jaydenfyi/scrolodex/tarball/v${VERSION}" \
            -o source.tar.gz
          FORMULA_SHA="$(/usr/bin/shasum -a 256 source.tar.gz | cut -d' ' -f1)"

          ASSET_ID="$(curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/jaydenfyi/scrolodex/releases/tags/v${VERSION}" \
            | python3 -c 'import json, sys; release=json.load(sys.stdin); print(next(asset["id"] for asset in release["assets"] if asset["name"] == "Scrolodex-'"${VERSION}"'.zip"))')"
          curl --fail --silent --show-error --location \
            --retry 5 --retry-all-errors --retry-delay 2 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/jaydenfyi/scrolodex/releases/assets/${ASSET_ID}" \
            -o release.zip
          CASK_SHA="$(/usr/bin/shasum -a 256 release.zip | cut -d' ' -f1)"
          test -n "${FORMULA_SHA}" || { echo "error: empty formula SHA256" >&2; exit 1; }
          test -n "${CASK_SHA}" || { echo "error: empty cask SHA256" >&2; exit 1; }
          echo "formula=${FORMULA_SHA}" >> "$GITHUB_OUTPUT"
          echo "cask=${CASK_SHA}" >> "$GITHUB_OUTPUT"
        env:
          NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION: ${{ needs.prepare-release.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update formula
        run: |
          VERSION="${NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION}"
          FORMULA_SHA="${STEPS_SHA_OUTPUTS_FORMULA}"
          sed -i '' 's|url ".*"|url "https://github.com/jaydenfyi/scrolodex/archive/refs/tags/v'"${VERSION}"'.tar.gz"|' Formula/scrolodex.rb
          sed -i '' 's|sha256 ".*"|sha256 "'"${FORMULA_SHA}"'"|' Formula/scrolodex.rb
        env:
          NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION: ${{ needs.prepare-release.outputs.version }}
          STEPS_SHA_OUTPUTS_FORMULA: ${{ steps.sha.outputs.formula }}
      - name: Update cask
        run: |
          VERSION="${NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION}"
          CASK_SHA="${STEPS_SHA_OUTPUTS_CASK}"
          sed -i '' 's|version ".*"|version "'"${VERSION}"'"|' Casks/scrolodex.rb
          sed -i '' 's|sha256 ".*"|sha256 "'"${CASK_SHA}"'"|' Casks/scrolodex.rb
        env:
          NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION: ${{ needs.prepare-release.outputs.version }}
          STEPS_SHA_OUTPUTS_CASK: ${{ steps.sha.outputs.cask }}
      - name: Commit and push
        run: |
          VERSION="${NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION}"
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add Formula/scrolodex.rb Casks/scrolodex.rb
          git commit -m "scrolodex ${VERSION}"
          git push
        env:
          NEEDS_PREPARE_RELEASE_OUTPUTS_VERSION: ${{ needs.prepare-release.outputs.version }}
