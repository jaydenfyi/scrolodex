[package]
versioned_files = []
changelog = "CHANGELOG.md"

[[package.assets]]
path = ".build/arm64-apple-macosx/release/Scrolodex-$version.zip"
name = "Scrolodex-$version.zip"

[github]
owner = "jaydenfyi"
repo = "scrolodex"

[[workflows]]
name = "prepare-release"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = "/usr/libexec/PlistBuddy -c 'Set :CFBundleShortVersionString $version' Resources/Info.plist"

[workflows.steps.variables]
"$version" = "Version"

[[workflows.steps]]
type = "Command"
command = "git add Resources/Info.plist CHANGELOG.md .changeset/"

[[workflows.steps]]
type = "Command"
command = "git commit -m \"chore: prepare release $version\""

[workflows.steps.variables]
"$version" = "Version"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "Release"

[[workflows]]
name = "document-change"

[[workflows.steps]]
type = "CreateChangeFile"
